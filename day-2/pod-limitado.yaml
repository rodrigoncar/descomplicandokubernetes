apiVersion: v1
kind: Pod
metadata:
  labels:
    run: giropops
  name: giropops
spec:
  containers:
    - image: ubuntu
      name: ubuntu
      resources: 
        limits:
          cpu: "1.8"
          memory: "256Mi"
        requests:
          cpu: "1.3"
          memory: "128Mi"
      args: 
      - sleep
      - "600"
  dnsPolicy: ClusterFirst
  restartPolicy: Always
status: {}
